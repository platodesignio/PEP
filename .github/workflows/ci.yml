name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://pep:pep_ci@localhost:5432/plato_event_proof_lab_test
  SESSION_SECRET: ci-test-secret-minimum-32-chars-long-abc
  ENCRYPTION_KEY: dGVzdC1rZXktMzItYnl0ZXMtbG9uZy1hYmNkZWY=
  APP_URL: http://localhost:3000
  RATE_LIMIT_WINDOW: "60000"
  RATE_LIMIT_MAX: "10000"
  ADMIN_BOOTSTRAP_EMAIL: admin@ci.test

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run type-check

      - run: npm run lint

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --coverage

      - name: Run integration tests
        run: npm run test:integration

  e2e-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pep
          POSTGRES_PASSWORD: pep_ci
          POSTGRES_DB: plato_event_proof_lab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run DB migrations
        run: npx prisma migrate deploy

      - name: Seed admin user
        run: npm run db:seed

      - name: Build
        run: npm run build

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          E2E_BASE_URL: http://localhost:3000

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
