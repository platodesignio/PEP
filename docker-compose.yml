version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pep
      POSTGRES_PASSWORD: pep_local_dev
      POSTGRES_DB: plato_event_proof_lab
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pep -d plato_event_proof_lab"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
